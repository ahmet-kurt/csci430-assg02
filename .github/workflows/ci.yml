name: CI Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.is_template }}
    steps:
      - uses: actions/checkout@v4
      - name: test successfully builds (30 pts)
        if: ${{ !cancelled() }}
        run: |
          make clean
          make
      - name: Task 0 Process class operations (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task0] | grep . && ./test [task0]
      - name: Task 1 ProcessSimulator initial state and getter accessor methods (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task1] | grep . && ./test [task1]
      - name: Task 2 newEvent() member function (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task2] | grep . && ./test [task2]
      - name: Task 3 dispatch() member function (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task3] | grep . && ./test [task3]
      - name: Task 4 cpuEvent() member function (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task4] | grep . && ./test [task4]
      - name: Task 5 timeout() member function (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task5] | grep . && ./test [task5]
      - name: Task 6 blockEvent() member function (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task6] | grep . && ./test [task6]
      - name: Task 7 unblockEvent() member function (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task7] | grep . && ./test [task7]
      - name: Task 8 doneEvent() member function (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task8] | grep . && ./test [task8]
      - name: system tests (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./scripts/run-system-tests
